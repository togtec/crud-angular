<div class="table-container">
  <table mat-table [dataSource]="courses" class="mat-elevation-z8">
    <!-- _id column -->
    <ng-container matColumnDef="_id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let course"> {{ course._id }} </td>
    </ng-container>

    <!-- name column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Course </th>
      <td mat-cell *matCellDef="let course"> {{ course.name }} </td>
    </ng-container>

    <!-- category column -->
    <ng-container matColumnDef="category">
      <th mat-header-cell *matHeaderCellDef> Category </th>
      <td mat-cell *matCellDef="let course">
        <div class="category-content">
          {{ course.category }}
          <mat-icon aria-hidden="false" aria-label="Course Category" fontIcon="{{ course.category | category }}"></mat-icon>
        </div>
      </td>
    </ng-container>

    <!-- action column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>
        <button matMiniFab matTooltip="Add Course"
                aria-label="Add Course"
                (click)="onAdd()"
          >
          <mat-icon>add</mat-icon>
        </button>
      </th>

      <td mat-cell *matCellDef="let course">
        <button matIconButton matTooltip="Edit Course"
                class="edit-button"
                aria-label="Edit Course"
                (click)="onEdit(course)">
          <mat-icon>edit</mat-icon>
        </button>

        <button matIconButton matTooltip="Remove Course" aria-label="Remove Course" class="delete-button">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
