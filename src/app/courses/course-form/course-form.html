<mat-card class="course-form-card" appearance="outlined">
  <mat-card-content>

    <mat-toolbar class="course-form-toolbar">
      <span>Curso - Detalhes</span>
    </mat-toolbar>

    <form [formGroup]="form">
      <mat-form-field class="full-width">
        <input matInput placeholder="Nome" formControlName="name">
      </mat-form-field>

      <mat-form-field class="full-width">
        <mat-label>Categoria</mat-label>
        <mat-select formControlName="category">
          <mat-option value="null"></mat-option>
          <mat-option value="front-end">Front-End</mat-option>
          <mat-option value="back-end">Back-End</mat-option>
        </mat-select>
      </mat-form-field>
    </form>

  </mat-card-content>

  <mat-card-actions class="center-actions">
    <button matButton="tonal" class="save-button" (click)="onSubmit()">Salvar</button>
    <button matButton="tonal" class="cancel-button" (click)="onCancel()">Cancelar</button>
  </mat-card-actions>
</mat-card>
